onboarding = false
[keys]
prefix = "ctrl+o"

# vim風: prefix+v でコピーモード開始（デフォルトの prefix+[ を置き換え）
copy_mode = "prefix+v"

# prefix+v をコピーモードに譲るため、縦分割は prefix+| のみ
split_vertical = ["prefix+|"]

# スクロールバック全体を $EDITOR (nvim) で開く
edit_scrollback = "prefix+e"

# 直前のペインと行き来（デフォルト未割り当て）
last_pane = "prefix+;"

# vim風: navigate mode (prefix+w) 内で j/k でも選択移動できるようにする
navigate_workspace_up = ["k", "up"]
navigate_workspace_down = ["j", "down"]

# workspaceを即切り替え（デフォルト未割り当て。copy_modeをvに移したので [ が空いた）
previous_workspace = "prefix+["
next_workspace = "prefix+]"

[worktrees]
directory = "~/worktrees"

# エージェントのdone/入力待ちをmacOSの通知センターに出す
# 3秒その状態が続いたときだけ通知（瞬間的な状態変化を無視）
[ui.toast]
delivery = "system"
delay_seconds = 3

[theme]
name = "dracula"
auto_switch = false
