"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](color_1)\
$os\
$username\
[](fg:color_1 bg:color_2)\
$directory\
[](fg:color_2 bg:color_3)\
$git_branch\
[](fg:color_3 bg:color_3)\
$git_status\
[ ](fg:color_3)\
$line_break$character"""

#[](fg:color_2 bg:color_bg3)\
#$docker_context\
#$conda\
#$pixi\
#[](fg:color_bg3 bg:color_bg1)\
#$time\

palette = 'blue_ocean'

[palettes.blue_ocean]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_1 = '#0e1a40'
color_2 = '#1d2a54'
color_3 = '#545454'
color_4 = '#7e7e7e'
color_5 = '#bdab8f'

#color_1 = '#458588'
#color_aqua = '#02a7dd'
#color_5 = '#9eff00'
#color_orange = '#662FC1'
#color_1 = '#662FC1'
#color_4 = '#ff0054'
#color_2 = '#ffd60a'
#color_3 = '#ff277f'
#color_cream = '#eee8df'
#color_2 = '#e2d2b4'
#color_ocean = '#2c365a'
#color_burg = '#7a2038'
#color_teal = '#0a4f54'
#color_3 = '#a6824a'
#color_grey = '#30373e'
#color_terra = '#A067DA'


[os]
disabled = false
style = "bg:color_1 fg:color_fg0"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
#Macos = "󰀵"
Macos = "🎸"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
EndeavourOS = ""
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
Pop = ""

[username]
show_always = true
style_user = "bg:color_1 fg:color_fg0"
style_root = "bg:color_1 fg:color_fg0"
format = '[ inamuu ]($style)'

[directory]
style = "fg:color_fg0 bg:color_2"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_3)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_4)]($style)'

[nodejs]
symbol = "✳️"
style = "bg:color_5"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_5)]($style)'

[rust]
symbol = ""
style = "bg:color_5"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_5)]($style)'

[ruby]
symbol = "💎"
style = "bg:color_5"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_5)]($style)'

[golang]
symbol = ""
style = "bg:color_5"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_5)]($style)'

[php]
symbol = ""
style = "bg:color_5"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_5)]($style)'

[python]
symbol = ""
style = "bg:color_5"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_5)]($style)'

[terraform]
disabled = true
symbol = "🚀"
style = "bg:color_5"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_5)]($style)'

[docker_context]
disabled = true
symbol = ""
style = "bg:color_bg3"
format = '[[ $symbol( $context) ](fg:color_fg0 bg:color_bg3)]($style)'

[time]
disabled = true
time_format = "%R"
style = "bg:color_bg1"
format = '[[  $time ](fg:color_fg0 bg:color_bg1)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[\$](bold fg:color_5)'
error_symbol = '[\$](bold fg:color_4)'
vimcmd_symbol = '[](bold fg:color_5)'
vimcmd_replace_one_symbol = '[](bold fg:color_1)'
vimcmd_replace_symbol = '[](bold fg:color_1)'
vimcmd_visual_symbol = '[](bold fg:color_2)'
