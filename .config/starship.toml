"$schema" = "https://starship.rs/config-schema.json"

palette = "molokai"
add_newline = false
scan_timeout = 20
command_timeout = 900
continuation_prompt = "[∙ ](fg:muted)"

format = """
$os$username$hostname$directory$git_branch$git_status$git_state
$character"""

#right_format = """
#$docker_context$terraform$golang$nodejs$python$rust$php$ruby$status$cmd_duration"""

[palettes.dracula]
# Dracula 系（公式より彩度を上げた濃いめトーン）
shadow = "#1a1b26"     # 明るいセグメント上の文字色として使用（より暗く）
chrome = "#383a59"     # 暗めパネル
panel = "#383a59"      # 暗めパネル
panel_alt = "#565f89"  # comment 寄り
violet = "#a45ff5"     # purple（濃いめ）
hot = "#ff4fb0"        # pink（濃いめ）
cyan = "#3ad6f0"       # cyan（濃いめ）
sky = "#3a9ef0"        # blue（docker/golang）
gold = "#ffd23f"       # yellow（濃いめ・ディレクトリ）
orange = "#ff9233"     # orange（濃いめ）
lime = "#2fe06a"       # green（濃いめ）
fg = "#f8f8f2"         # foreground
muted = "#565f89"      # comment

[palettes.molokai]
shadow = "#1B1D1E"
chrome = "#3E3D32"
panel = "#3E3D32"
panel_alt = "#49483E"
violet = "#C6A6FF"  # パステルパープル
hot = "#FF9AC1"     # パステルピンク
cyan = "#9FE8F5"    # パステルシアン
sky = "#A8D8F0"     # パステルブルー
gold = "#F0E6A8"    # パステルイエロー
orange = "#FFC895"  # パステルオレンジ
lime = "#C3E8A0"    # パステルグリーン
fg = "#F8F8F2"
muted = "#8A8877"

[palettes.neon_luxe]
shadow = "#0A1A2A"
chrome = "#1C344C"
panel = "#234A6B"
panel_alt = "#2E5E85"
violet = "#6FA8DC"  # 明るめの青
hot = "#4FD1C5"     # 明るめのエメラルドティール
cyan = "#4A9FD6"    # 少し濃めのブルー（git_status用）
sky = "#6EB8E8"     # 明るいスカイブルー
gold = "#A8D8F0"    # パステルブルー（ディレクトリ用アクセント）
orange = "#5FA3D6"  # 中間のブルー
lime = "#5EDCB5"    # 明るめエメラルドグリーン
fg = "#F0F7FC"
muted = "#A8BCCF"

[os]
disabled = false
style = "fg:shadow bg:violet bold"
format = "[](fg:violet)[$symbol ]($style)"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = ""
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
EndeavourOS = ""
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
Pop = ""

[username]
show_always = true
style_user = "fg:shadow bg:violet bold"
style_root = "fg:shadow bg:violet bold"
format = "[  inamuu ]($style)[](fg:violet)"

[hostname]
ssh_only = true
ssh_symbol = "󰣀 "
style = "fg:fg bg:panel bold"
format = "[](fg:panel)[ $ssh_symbol$hostname ]($style)[](fg:panel)"
trim_at = ".local"

[directory]
style = "fg:shadow bg:gold bold"
read_only = " 󰌾"
read_only_style = "fg:shadow bg:gold bold"
format = "[](fg:gold)[  $path$read_only ]($style)[](fg:gold)"
truncation_length = 4
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "
"ghq" = "󰏖 "

[git_branch]
symbol = ""
style = "fg:shadow bg:hot bold"
format = "[](fg:hot)[ $symbol $branch ]($style)[](fg:hot)"
truncation_length = 24
truncation_symbol = "…"

[git_status]
style = "fg:shadow bg:cyan bold"
format = "([](fg:cyan)[ $all_status$ahead_behind ]($style)[](fg:cyan))"
# 記号だけを表示（件数は出さない）。Nerd Font 前提のアイコン。
conflicted = " "    # コンフリクト
ahead = "󰅈 "     # ローカルが進んでいる
behind = "󰅕 "    # ローカルが遅れている
diverged = "󰮛 "  # 分岐（上下両方）
untracked = "󰋼 " # 未追跡ファイル
stashed = " "       # stash あり（旧 *17 の正体）
modified = "󰐊 "  # 変更あり（unstaged）
staged = " "        # ステージ済み
renamed = "󰑕 "   # リネーム
deleted = " "       # 削除

[git_state]
style = "fg:shadow bg:orange bold"
format = "([](fg:orange)[ $state( $progress_current/$progress_total) ]($style)[](fg:orange))"
rebase = "REBASE"
merge = "MERGE"
revert = "REVERT"
cherry_pick = "PICK"
bisect = "BISECT"
am = "AM"
am_or_rebase = "AM/REBASE"

[docker_context]
disabled = false
symbol = ""
style = "fg:shadow bg:sky bold"
format = "[](fg:sky)[ $symbol $context ]($style)[](fg:sky)"

[terraform]
disabled = false
symbol = "󱁢"
style = "fg:shadow bg:violet bold"
format = "[](fg:violet)[ $symbol $version ]($style)[](fg:violet)"

[golang]
symbol = ""
style = "fg:shadow bg:sky bold"
format = "[](fg:sky)[ $symbol $version ]($style)[](fg:sky)"

[nodejs]
symbol = ""
style = "fg:shadow bg:lime bold"
format = "[](fg:lime)[ $symbol $version ]($style)[](fg:lime)"

[python]
symbol = ""
style = "fg:shadow bg:cyan bold"
format = "[](fg:cyan)[ $symbol $version ]($style)[](fg:cyan)"

[rust]
symbol = ""
style = "fg:shadow bg:orange bold"
format = "[](fg:orange)[ $symbol $version ]($style)[](fg:orange)"

[php]
symbol = ""
style = "fg:shadow bg:violet bold"
format = "[](fg:violet)[ $symbol $version ]($style)[](fg:violet)"

[ruby]
symbol = ""
style = "fg:shadow bg:hot bold"
format = "[](fg:hot)[ $symbol $version ]($style)[](fg:hot)"

[status]
disabled = false
style = "fg:shadow bg:orange bold"
format = "[](fg:orange)[ ✘ $status ]($style)[](fg:orange)"
map_symbol = true

[cmd_duration]
min_time = 800
show_milliseconds = false
style = "fg:gold bg:chrome bold"
format = "[](fg:chrome)[ 󰔛 $duration ]($style)[](fg:chrome)"

[time]
disabled = false
time_format = "%H:%M"
style = "fg:fg bg:panel bold"
format = "[](fg:panel)[  $time ]($style)[](fg:panel)"

[character]
disabled = false
success_symbol = "[❯](bold fg:hot)"
error_symbol = "[❯](bold fg:orange)"
vimcmd_symbol = "[❮](bold fg:cyan)"
vimcmd_replace_one_symbol = "[❮](bold fg:gold)"
vimcmd_replace_symbol = "[❮](bold fg:gold)"
vimcmd_visual_symbol = "[❮](bold fg:violet)"
